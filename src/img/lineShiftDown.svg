        <text x="142.5" y="38.09090187501103" transform="scale(2.83465)" class="goneh-events">روز جهانی پناهندگان</text>
        <text x="142.5" y="53.09090187501103" transform="scale(2.83465)" class="goneh-events">شهادت دکتر مصطفی چمران /
            روز بسیج استادان / نابودی ناوگان تسلیم شده آلمان در اسکاپافلوی بریتانیا / روز جهانی یوگا</text>
        <text x="142.5" y="68.09090187501103" transform="scale(2.83465)" class="goneh-events">به سمت غرب تا رودخانه
            ویستولا در آن سوی ورشو در مرکز لهستان پیشروی کردند / آلمان نازی و دیگر نیروهای متحدین (به غیر از بلغارستان)
            به اتحاد جماهیر شوروی حمله کردند</text>
        <text x="142.5" y="63.09090187501103" transform="scale(2.83465)" class="goneh-events">روز اصناف / تأسیس سازمان
            تبلیغات اسلامی / روس‌ها حمله بزرگی را در بلاروس شرقی آغاز کردند و با از بین بردن «مرکز گروهی ارتش آلمان»،
        </text>
        <text x="142.5" y="83.09090187501103" transform="scale(2.83465)" class="goneh-events">روز خدمات عمومی سازمان ملل
            متحد / روز جهانی زنان بیوه</text>
        <text x="142.5" y="98.09090187501103" transform="scale(2.83465)" class="goneh-events">تاسوعای حسینی</text>
        <text x="142.5" y="113.09090187501103" transform="scale(2.83465)" class="goneh-events">عاشورای حسینی / روز
            دریانورد</text>
        <text x="142.5" y="128.090901875011" transform="scale(2.83465)" class="goneh-events">روز جهانی حمایت از قربانیان
            شکنجه / روز جهانی مبارزه با مواد مخدر و قاچاق غیر قانونی آن</text>
        <text x="15.5" y="23.327262625015432" transform="scale(2.83465)" class="goneh-monthAndWeek">هفته ۱۴ / خرداد و
            تیر</text>
